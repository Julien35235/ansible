---
- name: Mise à jour des serveurs Debian
  hosts: all
  become: true

  tasks:
    - name: Mettre à jour le cache apt
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Mettre à jour tous les paquets
      ansible.builtin.apt:
        upgrade: dist
        autoremove: true
        autoclean: true
      register: upgrade_result

    - name: Afficher les paquets mis à jour
      ansible.builtin.debug:
        msg: "{{ upgrade_result.stdout_lines }}"
      when: upgrade_result.stdout_lines | length > 0

    - name: Vérifier si un redémarrage est nécessaire
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Afficher si redémarrage nécessaire
      ansible.builtin.debug:
        msg: "⚠️ Redémarrage nécessaire sur {{ inventory_hostname }}"
      when: reboot_required.stat.exists
